<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640" width="800" height="640">
  <defs>
    <linearGradient id="sea" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a8d4f0"/>
      <stop offset="100%" stop-color="#5090c8"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8e8f8"/>
      <stop offset="100%" stop-color="#e8f4f8"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="wave">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="800" height="380" fill="url(#sky)"/>
  <!-- Sea -->
  <rect x="0" y="320" width="800" height="320" fill="url(#sea)"/>

  <!-- Horizon glow -->
  <ellipse cx="400" cy="330" rx="500" ry="30" fill="#d8f0f8" opacity="0.6" filter="url(#soft)"/>

  <!-- Clouds -->
  <ellipse cx="120" cy="100" rx="80" ry="30" fill="white" opacity="0.7" filter="url(#soft)"/>
  <ellipse cx="170" cy="90" rx="60" ry="24" fill="white" opacity="0.6" filter="url(#soft)"/>
  <ellipse cx="620" cy="130" rx="90" ry="32" fill="white" opacity="0.65" filter="url(#soft)"/>
  <ellipse cx="680" cy="118" rx="65" ry="25" fill="white" opacity="0.55" filter="url(#soft)"/>

  <!-- Waves -->
  <path d="M 0 360 Q 80 340 160 360 Q 240 380 320 360 Q 400 340 480 360 Q 560 380 640 360 Q 720 340 800 360" fill="none" stroke="white" stroke-width="3" opacity="0.5"/>
  <path d="M 0 400 Q 100 380 200 400 Q 300 420 400 400 Q 500 380 600 400 Q 700 420 800 400" fill="none" stroke="white" stroke-width="2.5" opacity="0.4"/>
  <path d="M 0 450 Q 80 430 160 450 Q 240 470 320 450 Q 400 430 480 450 Q 560 470 640 450 Q 720 430 800 450" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>

  <!-- Boat -->
  <!-- Hull -->
  <path d="M 220 370 Q 250 420 400 425 Q 550 420 580 370 Z" fill="#8b5e3c"/>
  <path d="M 240 380 Q 250 415 400 420 Q 550 415 560 380 Z" fill="#a06840"/>
  <!-- Deck -->
  <rect x="250" y="350" width="300" height="25" fill="#c89060" rx="3"/>
  <!-- Mast -->
  <rect x="393" y="180" width="14" height="175" fill="#7a5030" rx="3"/>
  <!-- Sail -->
  <path d="M 407 190 L 540 260 L 540 320 L 407 340 Z" fill="#f8f0e0" opacity="0.9"/>
  <path d="M 393 190 L 260 260 L 260 320 L 393 340 Z" fill="#f4ece0" opacity="0.85"/>
  <!-- Sail decoration -->
  <circle cx="480" cy="270" r="25" fill="none" stroke="#c84030" stroke-width="3" opacity="0.6"/>
  <circle cx="480" cy="270" r="12" fill="#c84030" opacity="0.4"/>

  <!-- Child hero on boat -->
  <circle cx="400" cy="315" r="22" fill="#f4c890"/>
  <ellipse cx="400" cy="298" rx="19" ry="14" fill="#2a1a0a"/>
  <ellipse cx="400" cy="335" rx="20" ry="26" fill="#e05840"/>
  <!-- Arms raised triumphantly -->
  <path d="M 382 322 Q 360 300 350 280" stroke="#e05840" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M 418 322 Q 440 300 450 280" stroke="#e05840" stroke-width="12" fill="none" stroke-linecap="round"/>
  <circle cx="350" cy="276" r="9" fill="#f4c890"/>
  <circle cx="450" cy="276" r="9" fill="#f4c890"/>
  <!-- Face details -->
  <circle cx="393" cy="313" r="4" fill="#1a0a00"/>
  <circle cx="407" cy="313" r="4" fill="#1a0a00"/>
  <path d="M 392 322 Q 400 328 408 322" stroke="#c06040" stroke-width="2" fill="none"/>
  <!-- Headband -->
  <rect x="382" y="302" width="36" height="7" fill="#f8d040" rx="2"/>

  <!-- Distant island with demon castle -->
  <ellipse cx="680" cy="310" rx="80" ry="35" fill="#7aaa60" opacity="0.7"/>
  <rect x="650" y="260" width="55" height="55" fill="#607080" opacity="0.7"/>
  <polygon points="645,260 710,260 678,230" fill="#506070" opacity="0.8"/>
  <!-- Castle details -->
  <rect x="660" y="270" width="12" height="15" fill="#80a0c0" opacity="0.5"/>
  <rect x="682" y="270" width="12" height="15" fill="#80a0c0" opacity="0.5"/>

  <!-- Birds in sky -->
  <path d="M 300 140 Q 310 130 320 140" stroke="#506080" stroke-width="2.5" fill="none"/>
  <path d="M 330 120 Q 342 110 354 120" stroke="#506080" stroke-width="2.5" fill="none"/>
  <path d="M 480 160 Q 492 150 504 160" stroke="#506080" stroke-width="2.5" fill="none"/>
</svg>
