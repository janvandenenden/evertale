<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640" width="800" height="640">
  <defs>
    <radialGradient id="bg" cx="40%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#e8f0d8"/>
      <stop offset="100%" stop-color="#c8d8a8"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="640" fill="url(#bg)"/>

  <!-- Soft sky band -->
  <rect x="0" y="0" width="800" height="280" fill="#d8ecf8" opacity="0.5"/>

  <!-- Bamboo grove left -->
  <rect x="30" y="180" width="12" height="380" fill="#7a9840" rx="4"/>
  <rect x="55" y="140" width="10" height="420" fill="#6a8830" rx="4"/>
  <rect x="75" y="200" width="11" height="360" fill="#7aaa40" rx="4"/>
  <ellipse cx="36" cy="180" rx="30" ry="12" fill="#90b840" opacity="0.7"/>
  <ellipse cx="60" cy="140" rx="28" ry="11" fill="#80a830" opacity="0.7"/>
  <ellipse cx="80" cy="200" rx="26" ry="10" fill="#90b840" opacity="0.7"/>
  <ellipse cx="36" cy="250" rx="28" ry="10" fill="#80a830" opacity="0.6"/>
  <ellipse cx="60" cy="210" rx="25" ry="9" fill="#88b035" opacity="0.6"/>

  <!-- Bamboo grove right -->
  <rect x="700" y="160" width="12" height="400" fill="#7a9840" rx="4"/>
  <rect x="725" y="190" width="10" height="370" fill="#6a8830" rx="4"/>
  <rect x="745" y="150" width="11" height="410" fill="#7aaa40" rx="4"/>
  <ellipse cx="706" cy="160" rx="30" ry="12" fill="#90b840" opacity="0.7"/>
  <ellipse cx="730" cy="190" rx="28" ry="11" fill="#80a830" opacity="0.7"/>
  <ellipse cx="750" cy="150" rx="26" ry="10" fill="#90b840" opacity="0.7"/>

  <!-- Path / ground -->
  <ellipse cx="400" cy="600" rx="400" ry="80" fill="#b8a870" opacity="0.5"/>
  <rect x="0" y="540" width="800" height="100" fill="#c8b880" opacity="0.4"/>
  <!-- Path lines -->
  <path d="M 320 640 Q 380 500 400 400 Q 420 500 480 640" fill="#d4c890" opacity="0.5"/>

  <!-- Elderly couple -->
  <!-- Grandmother -->
  <circle cx="280" cy="310" r="28" fill="#f4d0a8"/>
  <ellipse cx="280" cy="380" rx="32" ry="50" fill="#7888a8"/>
  <path d="M 260 320 Q 240 360 245 420" stroke="#5a6888" stroke-width="4" fill="none"/>
  <path d="M 300 320 Q 320 360 310 420" stroke="#5a6888" stroke-width="4" fill="none"/>
  <!-- Hair bun -->
  <ellipse cx="280" cy="290" rx="20" ry="16" fill="#606060"/>
  <circle cx="280" cy="284" r="8" fill="#707070"/>

  <!-- Grandfather -->
  <circle cx="520" cy="305" r="30" fill="#f4c890"/>
  <ellipse cx="520" cy="380" rx="35" ry="52" fill="#8878a0"/>
  <path d="M 498 315 Q 475 355 480 420" stroke="#685870" stroke-width="4" fill="none"/>
  <path d="M 542 315 Q 565 355 558 420" stroke="#685870" stroke-width="4" fill="none"/>
  <!-- White hair -->
  <ellipse cx="520" cy="286" rx="22" ry="17" fill="#e0e0e0"/>
  <!-- Walking stick -->
  <line x1="560" y1="360" x2="590" y2="460" stroke="#8b5e3c" stroke-width="5" stroke-linecap="round"/>

  <!-- Giant peach on path -->
  <circle cx="400" cy="480" r="55" fill="#f07888"/>
  <circle cx="400" cy="480" r="50" fill="#f4909e"/>
  <!-- Peach highlight -->
  <ellipse cx="385" cy="458" rx="18" ry="14" fill="#fcc0c8" opacity="0.6"/>
  <!-- Peach leaf -->
  <ellipse cx="400" cy="428" rx="12" ry="20" fill="#70aa50" transform="rotate(-20 400 428)"/>

  <!-- Sparkle lines around peach -->
  <line x1="350" y1="450" x2="330" y2="435" stroke="#f8d060" stroke-width="2" opacity="0.7"/>
  <line x1="340" y1="480" x2="315" y2="480" stroke="#f8d060" stroke-width="2" opacity="0.7"/>
  <line x1="450" y1="450" x2="470" y2="435" stroke="#f8d060" stroke-width="2" opacity="0.7"/>
  <line x1="460" y1="480" x2="485" y2="480" stroke="#f8d060" stroke-width="2" opacity="0.7"/>
  <line x1="400" y1="420" x2="400" y2="400" stroke="#f8d060" stroke-width="2" opacity="0.7"/>
</svg>
