<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640" width="800" height="640">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d0e8f8"/>
      <stop offset="60%" stop-color="#e8f4d8"/>
      <stop offset="100%" stop-color="#c8d8a0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="800" height="640" fill="url(#sky)"/>

  <!-- Cherry blossom trees background -->
  <rect x="100" y="280" width="18" height="280" fill="#7a5040" rx="5"/>
  <ellipse cx="109" cy="260" rx="70" ry="75" fill="#f4b0c0" opacity="0.6" filter="url(#soft)"/>
  <ellipse cx="80" cy="280" rx="50" ry="55" fill="#f0a0b0" opacity="0.5" filter="url(#soft)"/>

  <rect x="650" y="260" width="18" height="300" fill="#7a5040" rx="5"/>
  <ellipse cx="659" cy="240" rx="75" ry="80" fill="#f4b0c0" opacity="0.6" filter="url(#soft)"/>
  <ellipse cx="690" cy="265" rx="55" ry="58" fill="#f0a0b0" opacity="0.5" filter="url(#soft)"/>

  <!-- Falling petals -->
  <ellipse cx="200" cy="150" rx="5" ry="8" fill="#f4c0cc" opacity="0.7" transform="rotate(20 200 150)"/>
  <ellipse cx="350" cy="100" rx="4" ry="7" fill="#f4c0cc" opacity="0.6" transform="rotate(-15 350 100)"/>
  <ellipse cx="500" cy="180" rx="5" ry="8" fill="#f4c0cc" opacity="0.7" transform="rotate(30 500 180)"/>
  <ellipse cx="600" cy="130" rx="4" ry="7" fill="#f4c0cc" opacity="0.65" transform="rotate(-25 600 130)"/>
  <ellipse cx="150" cy="300" rx="4" ry="7" fill="#f4c0cc" opacity="0.6" transform="rotate(10 150 300)"/>
  <ellipse cx="680" cy="350" rx="5" ry="8" fill="#f4c0cc" opacity="0.55" transform="rotate(-20 680 350)"/>

  <!-- Ground with grass -->
  <ellipse cx="400" cy="600" rx="480" ry="90" fill="#a8c070" opacity="0.6"/>
  <rect x="0" y="560" width="800" height="80" fill="#90b060" opacity="0.5"/>

  <!-- Child hero (Momotaro) - centered, facing viewer -->
  <!-- Body -->
  <ellipse cx="400" cy="420" rx="40" ry="55" fill="#e05840"/>
  <!-- Kimono pattern dots -->
  <circle cx="390" cy="400" r="4" fill="#f8a030" opacity="0.6"/>
  <circle cx="410" cy="415" r="4" fill="#f8a030" opacity="0.6"/>
  <circle cx="385" cy="430" r="3" fill="#f8a030" opacity="0.6"/>
  <circle cx="415" cy="435" r="3" fill="#f8a030" opacity="0.6"/>
  <!-- Belt/obi -->
  <rect x="365" y="440" width="72" height="16" fill="#f8d040" rx="3"/>
  <!-- Legs -->
  <rect x="375" y="460" width="20" height="55" fill="#3060a0" rx="5"/>
  <rect x="407" y="460" width="20" height="55" fill="#3060a0" rx="5"/>
  <!-- Feet/sandals -->
  <ellipse cx="385" cy="518" rx="14" ry="8" fill="#7a5030"/>
  <ellipse cx="417" cy="518" rx="14" ry="8" fill="#7a5030"/>
  <!-- Arms -->
  <path d="M 365 400 Q 330 430 320 460" stroke="#e05840" stroke-width="16" fill="none" stroke-linecap="round"/>
  <path d="M 435 400 Q 470 430 480 460" stroke="#e05840" stroke-width="16" fill="none" stroke-linecap="round"/>
  <!-- Hands -->
  <circle cx="320" cy="464" r="10" fill="#f4c890"/>
  <circle cx="480" cy="464" r="10" fill="#f4c890"/>
  <!-- Head -->
  <circle cx="400" cy="325" r="42" fill="#f4c890"/>
  <!-- Hair -->
  <ellipse cx="400" cy="298" rx="38" ry="28" fill="#2a1a0a"/>
  <!-- Eyes -->
  <ellipse cx="385" cy="325" rx="7" ry="8" fill="white"/>
  <ellipse cx="415" cy="325" rx="7" ry="8" fill="white"/>
  <circle cx="387" cy="327" r="5" fill="#1a0a00"/>
  <circle cx="417" cy="327" r="5" fill="#1a0a00"/>
  <circle cx="389" cy="325" r="2" fill="white"/>
  <circle cx="419" cy="325" r="2" fill="white"/>
  <!-- Smile -->
  <path d="M 388 342 Q 400 352 412 342" stroke="#c06040" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Cheeks -->
  <ellipse cx="375" cy="338" rx="10" ry="7" fill="#f09080" opacity="0.4"/>
  <ellipse cx="425" cy="338" rx="10" ry="7" fill="#f09080" opacity="0.4"/>
  <!-- Headband -->
  <rect x="365" y="308" width="70" height="10" fill="#f8d040" rx="2"/>

  <!-- Dog companion -->
  <!-- Body -->
  <ellipse cx="260" cy="460" rx="35" ry="28" fill="#d4a060"/>
  <!-- Head -->
  <circle cx="290" cy="435" r="24" fill="#d4a060"/>
  <!-- Ears -->
  <ellipse cx="275" cy="418" rx="10" ry="15" fill="#c09050" transform="rotate(-15 275 418)"/>
  <ellipse cx="305" cy="416" rx="10" ry="15" fill="#c09050" transform="rotate(15 305 416)"/>
  <!-- Eyes -->
  <circle cx="284" cy="432" r="5" fill="#1a0a00"/>
  <circle cx="298" cy="432" r="5" fill="#1a0a00"/>
  <circle cx="285" cy="431" r="2" fill="white"/>
  <!-- Nose -->
  <ellipse cx="291" cy="440" rx="5" ry="4" fill="#2a1010"/>
  <!-- Tail -->
  <path d="M 225 455 Q 205 430 215 410" stroke="#d4a060" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Monkey companion -->
  <!-- Body -->
  <ellipse cx="540" cy="455" rx="30" ry="35" fill="#c09070"/>
  <!-- Head -->
  <circle cx="540" cy="415" r="26" fill="#c09070"/>
  <!-- Face patch -->
  <ellipse cx="540" cy="422" rx="16" ry="14" fill="#f4c0a0"/>
  <!-- Ears -->
  <circle cx="516" cy="415" r="10" fill="#c09070"/>
  <circle cx="516" cy="415" r="6" fill="#f4c0a0"/>
  <circle cx="564" cy="415" r="10" fill="#c09070"/>
  <circle cx="564" cy="415" r="6" fill="#f4c0a0"/>
  <!-- Eyes -->
  <circle cx="533" cy="414" r="5" fill="#1a0a00"/>
  <circle cx="547" cy="414" r="5" fill="#1a0a00"/>
  <circle cx="534" cy="413" r="2" fill="white"/>
  <!-- Tail -->
  <path d="M 570 460 Q 600 430 590 400 Q 580 370 600 360" stroke="#c09070" stroke-width="9" fill="none" stroke-linecap="round"/>
</svg>
