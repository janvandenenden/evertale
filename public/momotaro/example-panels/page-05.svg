<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640" width="800" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0dcc8"/>
      <stop offset="100%" stop-color="#c88840"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="fireGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f8d060" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f86020" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark dramatic sky -->
  <rect width="800" height="640" fill="url(#bg)"/>

  <!-- Storm clouds -->
  <ellipse cx="200" cy="120" rx="180" ry="70" fill="#706050" opacity="0.6" filter="url(#soft)"/>
  <ellipse cx="600" cy="100" rx="200" ry="80" fill="#605040" opacity="0.55" filter="url(#soft)"/>
  <ellipse cx="400" cy="80" rx="220" ry="75" fill="#504030" opacity="0.5" filter="url(#soft)"/>

  <!-- Demon fortress ground -->
  <rect x="0" y="480" width="800" height="160" fill="#5a4020" opacity="0.7"/>
  <ellipse cx="400" cy="480" rx="500" ry="60" fill="#6a5030" opacity="0.5"/>

  <!-- Fortress walls -->
  <rect x="80" y="300" width="640" height="200" fill="#807060" opacity="0.7"/>
  <!-- Battlements -->
  <rect x="80" y="280" width="40" height="30" fill="#807060" opacity="0.7"/>
  <rect x="150" y="280" width="40" height="30" fill="#807060" opacity="0.7"/>
  <rect x="220" y="280" width="40" height="30" fill="#807060" opacity="0.7"/>
  <rect x="540" y="280" width="40" height="30" fill="#807060" opacity="0.7"/>
  <rect x="610" y="280" width="40" height="30" fill="#807060" opacity="0.7"/>
  <rect x="680" y="280" width="40" height="30" fill="#807060" opacity="0.7"/>
  <!-- Gate -->
  <rect x="320" y="360" width="160" height="140" fill="#2a2010" opacity="0.9"/>
  <path d="M 320 360 Q 400 310 480 360" fill="#3a3020" opacity="0.8"/>
  <!-- Gate iron studs -->
  <circle cx="345" cy="390" r="6" fill="#a08060" opacity="0.7"/>
  <circle cx="375" cy="390" r="6" fill="#a08060" opacity="0.7"/>
  <circle cx="425" cy="390" r="6" fill="#a08060" opacity="0.7"/>
  <circle cx="455" cy="390" r="6" fill="#a08060" opacity="0.7"/>
  <circle cx="345" cy="430" r="6" fill="#a08060" opacity="0.7"/>
  <circle cx="455" cy="430" r="6" fill="#a08060" opacity="0.7"/>

  <!-- Fire torches -->
  <rect x="290" y="340" width="10" height="35" fill="#8b6040"/>
  <ellipse cx="295" cy="335" rx="10" ry="16" fill="#f86020" opacity="0.8" filter="url(#soft)"/>
  <ellipse cx="295" cy="332" rx="7" ry="12" fill="#f8d040" opacity="0.9"/>
  <circle cx="295" cy="330" r="20" fill="url(#fireGlow)"/>

  <rect x="500" y="340" width="10" height="35" fill="#8b6040"/>
  <ellipse cx="505" cy="335" rx="10" ry="16" fill="#f86020" opacity="0.8" filter="url(#soft)"/>
  <ellipse cx="505" cy="332" rx="7" ry="12" fill="#f8d040" opacity="0.9"/>
  <circle cx="505" cy="330" r="20" fill="url(#fireGlow)"/>

  <!-- Oni demon guard left -->
  <circle cx="160" cy="345" r="32" fill="#6090d0"/>
  <ellipse cx="160" cy="395" rx="38" ry="45" fill="#5080c0"/>
  <!-- Horns -->
  <polygon points="145,318 138,285 158,308" fill="#d0a030"/>
  <polygon points="175,318 182,285 162,308" fill="#d0a030"/>
  <!-- Eyes -->
  <circle cx="150" cy="342" r="8" fill="#f86020"/>
  <circle cx="170" cy="342" r="8" fill="#f86020"/>
  <circle cx="151" cy="343" r="4" fill="#1a0000"/>
  <circle cx="171" cy="343" r="4" fill="#1a0000"/>
  <!-- Mouth/fangs -->
  <path d="M 145 358 Q 160 368 175 358" stroke="#c03020" stroke-width="3" fill="none"/>
  <line x1="153" y1="358" x2="150" y2="368" stroke="white" stroke-width="3"/>
  <line x1="167" y1="358" x2="170" y2="368" stroke="white" stroke-width="3"/>
  <!-- Club -->
  <rect x="195" y="350" width="14" height="70" fill="#7a5030" rx="4" transform="rotate(-20 195 350)"/>
  <circle cx="202" cy="355" r="16" fill="#8b6040"/>

  <!-- Oni demon guard right -->
  <circle cx="640" cy="345" r="32" fill="#d05050"/>
  <ellipse cx="640" cy="395" rx="38" ry="45" fill="#c04040"/>
  <!-- Horns -->
  <polygon points="625,318 618,285 638,308" fill="#d0a030"/>
  <polygon points="655,318 662,285 642,308" fill="#d0a030"/>
  <!-- Eyes -->
  <circle cx="630" cy="342" r="8" fill="#f8f040"/>
  <circle cx="650" cy="342" r="8" fill="#f8f040"/>
  <circle cx="631" cy="343" r="4" fill="#1a0000"/>
  <circle cx="651" cy="343" r="4" fill="#1a0000"/>
  <!-- Mouth/fangs -->
  <path d="M 625 358 Q 640 368 655 358" stroke="#901010" stroke-width="3" fill="none"/>
  <line x1="633" y1="358" x2="630" y2="368" stroke="white" stroke-width="3"/>
  <line x1="647" y1="358" x2="650" y2="368" stroke="white" stroke-width="3"/>
  <!-- Club -->
  <rect x="590" y="355" width="14" height="70" fill="#7a5030" rx="4" transform="rotate(20 590 355)"/>
  <circle cx="597" cy="360" r="16" fill="#8b6040"/>

  <!-- Child hero approaching -->
  <circle cx="400" cy="390" r="24" fill="#f4c890"/>
  <ellipse cx="400" cy="372" rx="20" ry="15" fill="#2a1a0a"/>
  <ellipse cx="400" cy="418" rx="22" ry="28" fill="#e05840"/>
  <!-- Sword raised -->
  <line x1="420" y1="390" x2="460" y2="330" stroke="#d0d8f0" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="424" cy="385" rx="8" ry="5" fill="#c0a030" transform="rotate(-50 424 385)"/>
  <!-- Headband -->
  <rect x="381" y="376" width="38" height="8" fill="#f8d040" rx="2"/>
  <!-- Brave expression -->
  <circle cx="393" cy="390" r="4" fill="#1a0a00"/>
  <circle cx="407" cy="390" r="4" fill="#1a0a00"/>
  <path d="M 392 399 Q 400 403 408 399" stroke="#c06040" stroke-width="2" fill="none"/>
  <!-- Cheeks -->
  <ellipse cx="382" cy="396" rx="8" ry="6" fill="#f09080" opacity="0.4"/>
  <ellipse cx="418" cy="396" rx="8" ry="6" fill="#f09080" opacity="0.4"/>

  <!-- Lightning bolt in sky -->
  <polyline points="520,60 505,120 520,120 505,190" stroke="#f8f040" stroke-width="4" fill="none" opacity="0.7"/>
</svg>
